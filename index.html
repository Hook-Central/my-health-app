<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Water Kernel v5.0</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --green: #30d158; --gray: #8e8e93; --red: #ff453a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; max-width: 350px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { font-size: 0.8rem; color: var(--gray); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { display: flex; flex-direction: column; }
        .label { font-size: 0.75rem; color: var(--gray); }
        .value { font-size: 1.4rem; font-weight: bold; color: var(--blue); }
        .unit { font-size: 0.8rem; color: var(--gray); font-weight: normal; }

        .progress-container { width: 100%; background: #333; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.5s ease; }

        input { width: 100%; background: #2c2c2e; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; margin: 8px 0; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); background: #0071e3; }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .badge-ok { background: rgba(48, 209, 88, 0.2); color: var(--green); }
        .badge-alert { background: rgba(255, 69, 58, 0.2); color: var(--red); }
        
        #logSystem { font-family: monospace; font-size: 0.7rem; color: var(--green); margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Dashboard Medica</h2>
        <div class="stat-grid">
            <div class="stat-box">
                <span class="label">Acqua Totale (TBW)</span>
                <span class="value" id="uiTbw">-- <span class="unit">L</span></span>
            </div>
            <div class="stat-box">
                <span class="label">Ritenzione Idrica</span>
                <span class="value" id="uiRit">--</span>
                <div id="uiRitBadge"></div>
            </div>
            <div class="stat-box">
                <span class="label">Intra (ICW)</span>
                <span class="value" id="uiIcw" style="color: #64d2ff;">-- <span class="unit">L</span></span>
            </div>
            <div class="stat-box">
                <span class="label">Extra (ECW)</span>
                <span class="value" id="uiEcw">-- <span class="unit">L</span></span>
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <span class="label">Obiettivo Idratazione: <span id="uiBevutoText">0</span> / 2.0 L</span>
            <div class="progress-container">
                <div class="progress-bar" id="uiBar"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Input Biometrico</h2>
        <input type="number" id="inputH" placeholder="Altezza (cm)" value="180">
        <input type="number" id="inputP" placeholder="Peso (kg)" value="80">
        <input type="number" id="inputR" placeholder="Resistenza Ohm (es. 620)">
        <button onclick="calcola()">Analizza Dati</button>
        <div id="logSystem">In attesa di scansione...</div>
    </div>

    <script>
        let tbwRiferimento = 0;
        let bevutoOggi = 0;

        function calcola() {
            // Prendo i valori dall'interfaccia
            const h = parseFloat(document.getElementById('inputH').value);
            const p = parseFloat(document.getElementById('inputP').value);
            const rLeotta = parseFloat(document.getElementById('inputR').value);

            if (!rLeotta) {
                alert("Inserisci il valore di Resistenza!");
                return;
            }

            // Logica del Kernel (dal tuo codice C)
            const coeffPolso = 0.88;
            const r_p = rLeotta * coeffPolso;

            const tbw = (0.396 * (Math.pow(h, 2) / r_p)) + (0.143 * p) + 8.4;
            const ecw = (0.188 * (Math.pow(h, 2) / r_p)) + (0.110 * p) + 2.5;
            const icw = tbw - ecw;
            const ritenzione = ecw / tbw;
            const bcm = icw / 0.70;

            // Logica rilevamento bevuta automatica
            if (tbwRiferimento > 0) {
                let delta = tbw - tbwRiferimento;
                if (delta >= 0.150) {
                    bevutoOggi += delta;
                    document.getElementById('logSystem').innerText = "RILEVATO INGRESSO LIQUIDI: +" + delta.toFixed(2) + "L";
                }
            }
            tbwRiferimento = tbw;

            // Aggiornamento UI
            document.getElementById('uiTbw').innerHTML = tbw.toFixed(2) + ' <span class="unit">L</span>';
            document.getElementById('uiIcw').innerHTML = icw.toFixed(1) + ' <span class="unit">L</span>';
            document.getElementById('uiEcw').innerHTML = ecw.toFixed(1) + ' <span class="unit">L</span>';
            document.getElementById('uiRit').innerText = ritenzione.toFixed(3);
            
            // Gestione Badge Ritenzione
            const badge = document.getElementById('uiRitBadge');
            if (ritenzione > 0.40) {
                badge.innerHTML = '<span class="badge badge-alert">ALTA RITENZIONE</span>';
            } else {
                badge.innerHTML = '<span class="badge badge-ok">NORMALE</span>';
            }

            // Barra progresso
            const pct = Math.min((bevutoOggi / 2.0) * 100, 100);
            document.getElementById('uiBar').style.width = pct + "%";
            document.getElementById('uiBevutoText').innerText = bevutoOggi.toFixed(2);
        }
    </script>
</body>
</html>
