<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Kernel v10.0 - Persistent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #0a84ff; --cyan: #64d2ff; --green: #30d158; --gray: #8e8e93; --red: #ff453a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #333; }
        h2 { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .val { font-size: 1.3rem; font-weight: bold; color: var(--blue); display: block; }
        .unit { font-size: 0.7rem; color: var(--gray); display: block; margin-bottom: 4px; }
        .dist-container { margin: 15px 0 5px; background: #2c2c2e; border-radius: 8px; height: 26px; display: flex; overflow: hidden; border: 1px solid #444; }
        .bar-icw { background: var(--cyan); height: 100%; transition: width 0.6s ease; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: #000; }
        .bar-ecw { background: var(--blue); height: 100%; transition: width 0.6s ease; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .progress-box { position: relative; width: 100px; height: 100px; margin: 0 auto; }
        svg { transform: rotate(-90deg); width: 100px; height: 100px; }
        circle { fill: none; stroke-width: 7; stroke-linecap: round; cx: 50; cy: 50; r: 44; }
        .bg { stroke: #333; }
        .fg { stroke: var(--blue); transition: stroke-dashoffset 0.8s ease; }
        .pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.1rem; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; font-size: 1rem; box-sizing: border-box; outline: none; }
        input { background: #2c2c2e; color: white; border: 1px solid #444; }
        select { background: #2c2c2e; color: var(--cyan); border: 1px solid var(--blue); }
        button { background: var(--blue); color: white; font-weight: bold; margin-top: 8px; }
        .btn-reset { background: #3a3a3c; color: var(--red); font-size: 0.85rem; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="card" style="display: flex; align-items: center; gap: 20px;">
        <div class="progress-box">
            <svg><circle class="bg"></circle><circle class="fg" id="ring"></circle></svg>
            <div class="pct" id="totalL">0.00L</div>
        </div>
        <div style="flex-grow: 1;">
            <span class="unit">Resistenza Attuale</span>
            <span class="val" id="uiOhm" style="color: var(--green);">-- Ω</span>
            <span class="unit" id="statusMsg">Caricamento memoria...</span>
        </div>
    </div>

    <div class="card">
        <h2>Bilancio Fluidi (ICW/ECW)</h2>
        <div class="dist-container"><div id="barICW" class="bar-icw">--</div><div id="barECW" class="bar-ecw">--</div></div>
        <div class="stat-grid" style="margin-top: 15px;">
            <div><span class="unit">Litri Intra (ICW)</span><span id="litriICW" class="val" style="color:var(--cyan)">--</span></div>
            <div><span class="unit">Litri Extra (ECW)</span><span id="litriECW" class="val">--</span></div>
        </div>
    </div>

    <div class="card">
        <canvas id="hydrationChart" height="130"></canvas>
    </div>

    <div class="card">
        <h2>Simulatore</h2>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="h" value="180" onchange="salvaDati()">
            <input type="number" id="p" value="80" onchange="salvaDati()">
        </div>
        <select id="tipoBevanda">
            <option value="1.0">Acqua Naturale (100%)</option>
            <option value="0.9">Tè / Tisana (90%)</option>
            <option value="0.8">Spremuta / Bibita (80%)</option>
            <option value="0.7">Caffè (70%)</option>
        </select>
        <select id="quantita">
            <option value="0.25">250ml (Bicchiere)</option>
            <option value="0.50">500ml (Bottiglia)</option>
            <option value="0.125">125ml (Tazza/Caffè)</option>
        </select>
        <button onclick="simulaBevuta()">Registra Assunzione</button>
        <button class="btn-reset" onclick="resetGiorno()">Reset Giornata</button>
    </div>

<script>
    let bevutoOggi = 0;
    let rCorrente = 0;
    const TARGET = 2.0;
    const circ = 44 * 2 * Math.PI;
    let chart;
    let dataPoints = new Array(48).fill(0);

    function init() {
        const ctx = document.getElementById('hydrationChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 48}, (_, i) => `${Math.floor(i/2)}:${i%2===0?"00":"30"}`),
                datasets: [{ data: dataPoints, borderColor: '#0a84ff', backgroundColor: 'rgba(10, 132, 255, 0.1)', fill: true, tension: 0.4, pointRadius: 0 }]
            },
            options: { scales: { y: { min: 0, max: 2.5, ticks: { display: false }, grid: { display: false } }, x: { ticks: { color: '#8e8e93', maxTicksLimit: 6 }, grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
        
        caricaDati();
    }

    // --- LOGICA DI MEMORIA ---
    function salvaDati() {
        const h = document.getElementById('h').value;
        const p = document.getElementById('p').value;
        const stato = {
            bevutoOggi,
            rCorrente,
            dataPoints,
            h,
            p,
            ultimoSalvataggio: new Date().toLocaleDateString()
        };
        localStorage.setItem('medicalKernelData', JSON.stringify(stato));
    }

    function caricaDati() {
        const salvataggio = localStorage.getItem('medicalKernelData');
        if (salvataggio) {
            const dati = JSON.parse(salvataggio);
            // Controllo se il salvataggio è di oggi
            if (dati.ultimoSalvataggio === new Date().toLocaleDateString()) {
                bevutoOggi = dati.bevutoOggi;
                rCorrente = dati.rCorrente;
                dati.dataPoints.forEach((v, i) => dataPoints[i] = v);
                document.getElementById('h').value = dati.h;
                document.getElementById('p').value = dati.p;
                document.getElementById('statusMsg').innerText = "Dati ripristinati";
            } else {
                inizializzaNuovoGiorno();
                document.getElementById('statusMsg').innerText = "Nuovo giorno rilevato";
            }
        } else {
            inizializzaNuovoGiorno();
            document.getElementById('statusMsg').innerText = "Configurazione iniziale";
        }
        chart.update();
        aggiornaUI();
    }

    function inizializzaNuovoGiorno() {
        const h = parseFloat(document.getElementById('h').value);
        const p = parseFloat(document.getElementById('p').value);
        bevutoOggi = 0;
        dataPoints.fill(0);
        const tbwTeorico = p * 0.58; 
        rCorrente = (0.396 * Math.pow(h, 2)) / ((tbwTeorico - 8.4 - 0.143 * p) * 0.88);
        salvaDati();
    }

    function simulaBevuta() {
        const mlEffettivi = parseFloat(document.getElementById('quantita').value) * parseFloat(document.getElementById('tipoBevanda').value);
        rCorrente -= (rCorrente * 0.045) * (mlEffettivi / 1.0); 
        bevutoOggi += mlEffettivi;

        const index = new Date().getHours() * 2 + (new Date().getMinutes() >= 30 ? 1 : 0);
        for(let i = index; i < 48; i++) dataPoints[i] = bevutoOggi;
        
        chart.update();
        aggiornaUI();
        salvaDati();
        document.getElementById('statusMsg').innerText = "Dato salvato in locale";
    }

    function aggiornaUI() {
        const h = parseFloat(document.getElementById('h').value);
        const p = parseFloat(document.getElementById('p').value);
        const rp = rCorrente * 0.88;
        const tbw = (0.396 * (Math.pow(h, 2) / rp)) + (0.143 * p) + 8.4;
        const ecw = (0.188 * (Math.pow(h, 2) / rp)) + (0.110 * p) + 2.5;
        const icw = tbw - ecw;
        
        document.getElementById('uiOhm').innerText = Math.round(rCorrente) + " Ω";
        document.getElementById('totalL').innerText = bevutoOggi.toFixed(2) + "L";
        document.getElementById('litriICW').innerText = icw.toFixed(1) + " L";
        document.getElementById('litriECW').innerText = ecw.toFixed(1) + " L";

        const pctICW = (icw / tbw) * 100;
        document.getElementById('barICW').style.width = pctICW + "%";
        document.getElementById('barECW').style.width = (100 - pctICW) + "%";
        document.getElementById('barICW').innerText = Math.round(pctICW) + "%";
        document.getElementById('barECW').innerText = Math.round(100 - pctICW) + "%";

        const ring = document.getElementById('ring');
        ring.style.strokeDasharray = circ;
        ring.style.strokeDashoffset = circ - (Math.min(bevutoOggi / TARGET, 1) * circ);
    }

    function resetGiorno() {
        localStorage.removeItem('medicalKernelData');
        inizializzaNuovoGiorno();
        chart.update();
        aggiornaUI();
        document.getElementById('statusMsg').innerText = "Memoria cancellata";
    }

    window.onload = init;
</script>
</body>
</html>
